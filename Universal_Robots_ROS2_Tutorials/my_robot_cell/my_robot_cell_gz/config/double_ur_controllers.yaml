      robot1_ur10e_elbow_joint: { trajectory: 0.2, goal: 0.1 }
      robot1_ur10e_wrist_1_joint: { trajectory: 0.2, goal: 0.1 }
      robot1_ur10e_wrist_2_joint: { trajectory: 0.2, goal: 0.1 }
      robot1_ur10e_wrist_3_joint: { trajectory: 0.2, goal: 0.1 }

